<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Village Wallpaper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wallpaper">
    <!-- Canvas de partículas (mais ao fundo) -->
    <canvas id="particles"></canvas>

    <!-- Raios de luz (god rays) -->
    <div class="god-rays">
      <span class="ray"></span>
      <span class="ray"></span>
      <span class="ray"></span>
      <span class="ray"></span>
      <span class="ray"></span>
      <span class="ray"></span>
    </div>

    <!-- Reflexo de luz na neblina -->
    <div class="mist-glow"></div>

    <!-- Fundo: vila -->
    <img class="bg-village" src="imgs/vila.png" alt="Vila">

    <!-- Ilha flutuante central inferior -->
    <div class="island-wrapper">
      <img class="island" src="imgs/ilha.png" alt="Ilha Flutuante">
      <!-- Cachoeira -->
      <div class="waterfall"></div>
      <div class="waterfall-splash"></div>
      <div class="island-shadow"></div>
    </div>

    <!-- Relógio místico -->
    <div class="mystic-clock">
      <div class="clock-ornament clock-ornament--top">⁕</div>
      <div class="clock-time">
        <span id="clock-h">00</span>
        <span class="clock-sep">∶</span>
        <span id="clock-m">00</span>
        <span class="clock-sep">∶</span>
        <span id="clock-s">00</span>
      </div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-ornament clock-ornament--bot">⁕</div>
    </div>

    <!-- Neblina mística — múltiplas camadas -->
    <div class="mist mist-base"></div>
    <div class="mist mist-mid"></div>
    <div class="mist mist-tendrils"></div>
    <div class="mist mist-veil"></div>
    <div class="vignette"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
